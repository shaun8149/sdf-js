<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Atlas Figure — sequence/funnel</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0e0f12;
        overflow: hidden;
      }
      #wrap {
        position: fixed;
        inset: 0;
      }
      #c {
        display: block;
        width: 100%;
        height: 100%;
      }
      .lbl {
        position: fixed;
        transform: translate(-50%, -50%);
        pointer-events: none;
        font:
          600 13px -apple-system,
          Inter,
          sans-serif;
        color: #fff;
        padding: 4px 10px;
        border-radius: 5px;
        background: rgba(30, 32, 40, 0.82);
        opacity: 0;
        transition: opacity 0.5s;
        white-space: nowrap;
      }
      .lbl.value {
        background: rgba(40, 116, 196, 0.92);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="wrap"><canvas id="c"></canvas></div>
    <script type="module" src="./figure.js"></script>
  </body>
</html>
