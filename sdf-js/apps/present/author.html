<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Atlas Author — text → world</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0e0f12;
        overflow: hidden;
      }
      #wrap {
        position: fixed;
        inset: 0;
      }
      #c {
        display: block;
        width: 100%;
        height: 100%;
      }
      .lbl {
        position: fixed;
        transform: translate(-50%, -50%);
        pointer-events: none;
        font:
          600 13px -apple-system,
          Inter,
          sans-serif;
        color: #fff;
        padding: 4px 10px;
        border-radius: 5px;
        background: rgba(30, 32, 40, 0.82);
        opacity: 0;
        transition: opacity 0.5s;
        white-space: nowrap;
      }
      .lbl.value {
        background: rgba(40, 116, 196, 0.92);
        font-weight: 700;
      }
      /* Stage layer — screen-space narrative typography. The 3D world tells
         the story; sentences live on THIS canvas: a huge composed title and a
         bullet column, never projected onto geometry. */
      .stage-title {
        position: fixed;
        top: 6vh;
        left: 50%;
        transform: translate(-50%, -14px);
        font:
          900 clamp(44px, 7.2vh, 96px) / 1.12 -apple-system,
          Inter,
          sans-serif;
        letter-spacing: 0.04em;
        color: #fff;
        text-shadow:
          0 1px 3px rgba(0, 0, 0, 0.9),
          0 6px 30px rgba(0, 0, 0, 0.65);
        opacity: 0;
        transition:
          opacity 0.5s,
          transform 0.5s;
        pointer-events: none;
        white-space: nowrap;
        z-index: 30;
      }
      .stage-title.on {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      .stage-bullet {
        position: fixed;
        left: 6.5vw;
        font:
          700 clamp(20px, 3.5vh, 42px) / 1.3 -apple-system,
          Inter,
          sans-serif;
        color: rgba(255, 255, 255, 0.96);
        text-shadow:
          0 1px 3px rgba(0, 0, 0, 0.85),
          0 3px 18px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transform: translateX(-18px);
        transition:
          opacity 0.45s,
          transform 0.45s;
        pointer-events: none;
        max-width: 44vw;
        z-index: 30;
      }
      .stage-bullet.on {
        opacity: 1;
        transform: translateX(0);
      }
      /* author bar — the one input that turns words into a world */
      #bar {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        width: min(760px, calc(100vw - 40px));
        display: flex;
        gap: 8px;
        z-index: 20;
        font-family: -apple-system, Inter, sans-serif;
      }
      #prompt {
        flex: 1;
        resize: none;
        height: 52px;
        padding: 14px 16px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(20, 22, 28, 0.92);
        color: #fff;
        font: 500 14px -apple-system, Inter, sans-serif;
        outline: none;
      }
      #prompt:focus {
        border-color: rgba(90, 150, 250, 0.7);
      }
      #go {
        padding: 0 22px;
        border-radius: 10px;
        border: 0;
        background: #2d6fd6;
        color: #fff;
        font: 700 14px -apple-system, Inter, sans-serif;
        cursor: pointer;
      }
      #go:disabled {
        opacity: 0.5;
        cursor: wait;
      }
      #status {
        position: fixed;
        left: 50%;
        bottom: 84px;
        transform: translateX(-50%);
        font: 500 12px -apple-system, Inter, sans-serif;
        color: rgba(255, 255, 255, 0.6);
        z-index: 20;
        max-width: min(760px, calc(100vw - 40px));
        text-align: center;
      }
      #status.err {
        color: #ff9a8a;
      }
      #keyrow {
        position: fixed;
        right: 14px;
        top: 12px;
        z-index: 20;
        display: flex;
        gap: 6px;
      }
      #key {
        width: 220px;
        padding: 6px 10px;
        border-radius: 7px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(20, 22, 28, 0.9);
        color: #ccc;
        font: 400 11px monospace;
        outline: none;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #0e0f12;
        transition: opacity 0.4s;
        z-index: 10;
      }
      #loading.done {
        opacity: 0;
        pointer-events: none;
      }
      #loading .ring {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.14);
        border-top-color: rgba(255, 255, 255, 0.85);
        animation: spin 0.9s linear infinite;
      }
      #loading .msg {
        font:
          500 12px -apple-system,
          Inter,
          sans-serif;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="wrap"><canvas id="c"></canvas></div>
    <div id="loading" class="done"><div class="ring"></div><div class="msg">compiling scene</div></div>
    <div id="keyrow"><input id="key" type="password" placeholder="Anthropic API key (BYOK, stays local)" /></div>
    <div id="status">describe what you want to present — Atlas builds the world</div>
    <div id="bar">
      <textarea id="prompt" placeholder="e.g. our Q3: revenue by region (Americas leads at 890), the sales funnel from 1200 leads to 45 closed, and the new org under the CEO"></textarea>
      <button id="go">Generate</button>
    </div>
    <script type="module" src="./author.js"></script>
  </body>
</html>
