<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GLSL smoke (loading)</title>
  </head>
  <body>
    <!--
      Dev tool: compile a GLSL helper-library string in a real WebGL2 context
      (GLSL ES 1.00 dialect, matching the studio/fly shaders) to catch GPU-only
      compile errors (reserved words, fwidth/derivatives, ES-1.00 limits) that
      node --check cannot. Logs "GLSL-SMOKE-OK <lib>" or "GLSL-SMOKE-FAIL ...".
      Reused per IQ-shader wave; add the wave's library + a main() that
      references its functions so nothing is dead-stripped.
    -->
    <canvas id="c" width="8" height="8"></canvas>
    <script type="module">
      import { EASING_GLSL } from '../src/sdf/easing.js';
      import { NOISE_GLSL } from '../src/sdf/noise.js';
      import { FILTER_GLSL } from '../src/sdf/filter.js';
      import { LIGHTING_GLSL } from '../src/sdf/lighting.js';
      import { SDG_GLSL } from '../src/sdf/sdg.js';
      import { BOUNDS_GLSL } from '../src/sdf/bounds.js';
      import { INTERSECT_GLSL } from '../src/sdf/intersect.js';
      import { FRACTAL_GLSL } from '../src/sdf/fractal.js';
      import { EFFECTS_GLSL } from '../src/sdf/effects.js';
      import { MATHX_GLSL } from '../src/sdf/mathx.js';

      const gl = document.getElementById('c').getContext('webgl2');
      const vsSrc = 'attribute vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }';
      const fsSrc = `#ifdef GL_ES
precision highp float;
#endif
${EASING_GLSL}
${NOISE_GLSL}
${FILTER_GLSL}
${LIGHTING_GLSL}
${SDG_GLSL}
${BOUNDS_GLSL}
${INTERSECT_GLSL}
${FRACTAL_GLSL}
${EFFECTS_GLSL}
${MATHX_GLSL}
void main(){
  float s = smootherstep(0.5) + parabola(0.5, 2.0) + gain(0.3, 3.0)
    + cubicPulse(0.5, 0.2, 0.5) + smoothstepInteg(0.7) + invSmoothstep(0.4)
    + pcurve(0.5, 2.0, 2.0) + expImpulse(0.2, 8.0) + expStep(0.3, 5.0, 2.0)
    + sinc(0.1, 1.0) + sigmoid(0.2) + almostIdentity(0.5, 1.0, 0.2)
    + remap(5.0, 0.0, 10.0, 0.0, 1.0) + remapClamp(15.0, 0.0, 10.0, 0.0, 1.0)
    + smoothstep01(0.5);
  vec2 p = vec2(1.3, 2.7);
  s += valueNoiseD2(p).x + valueNoiseD3(vec3(p, 0.5)).x + gradientNoiseD2(p).x
    + fbmD2(p, 5).x + domainWarp2(p) + voronoise2(p, 1.0, 0.5)
    + voronoiSmooth2(p, 8.0) + voronoiEdges2(p).y;
  s += checkersFiltered(p, vec2(0.01)) + gridFiltered(p, 0.05, vec2(0.01))
    + triWaveFiltered(0.3, 0.1) + stripesFiltered(0.3, 0.1)
    + filterWidth(5.0, 900.0, 0.5, 1.5) + biplanarWeights(vec3(0.1, 0.9, 0.05), 8.0).y
    + srgbToLinear(vec3(0.5)).x + linearToSrgb(vec3(0.5)).x
    + premultOver(vec3(1.0, 0.0, 0.0), 1.0, vec3(0.0, 0.0, 1.0), 1.0).x
    + improvedBilinearUV(vec2(2.5)).x;
  s += sphereAO(vec3(0.0), vec3(0.0, 0.0, 1.0), vec4(0.0, 0.0, 1.2, 1.0))
    + sphereSoftShadow(vec3(0.0), vec3(0.0, 0.0, 1.0), vec4(0.0, 0.0, 5.0, 1.0), 8.0)
    + fresnelSchlick(0.5, 0.04) + hemisphereLight(0.5)
    + outdoorLighting(vec3(0.0, 1.0, 0.0), vec3(0.0, 1.0, 0.0), 1.0, 1.0, vec3(1.0),
        vec3(1.0), vec3(0.4, 0.6, 1.0), vec3(0.3, 0.25, 0.2)).x
    + betterFog(vec3(0.2, 0.5, 0.8), 100.0, vec3(0.0, 0.0, 1.0), vec3(1.0, 0.0, 0.0),
        vec3(0.7, 0.8, 0.9), vec3(1.0, 0.9, 0.7), 0.02).x;
  s += sdgCircle(p, 1.0).x + sdgBox(p, vec2(1.0, 0.6)).y
    + sdgSegment(p, vec2(-1.0, 0.0), vec2(1.0, 0.0)).z
    + sdgSphere(vec3(p, 0.5), 1.0).x + sdgBox3(vec3(p, 0.5), vec3(1.0, 0.7, 0.5)).y
    + sdgTorus(vec3(p, 0.5), 1.0, 0.3).z;
  s += sphereProjRadius(5.0, 1.0, 1.5) + sdBoxLinf(vec3(p, 0.5), vec3(1.0))
    + sdBoundingBox(vec3(p, 0.5), vec3(-1.5), vec3(1.5));
  s += iSphere(vec3(0.0, 0.0, -5.0), vec3(0.0, 0.0, 1.0), vec3(0.0), 1.0)
    + iBox(vec3(0.0, 0.0, -5.0), vec3(0.0, 0.0, 1.0), vec3(0.0), vec3(1.0)).x
    + iPlane(vec3(0.0, 2.0, 0.0), vec3(0.0, -1.0, 0.0), vec3(0.0, 1.0, 0.0), 0.0)
    + iTriangle(vec3(0.0, 0.0, -1.0), vec3(0.0, 0.0, 1.0), vec3(-1.0, -1.0, 0.0), vec3(1.0, -1.0, 0.0), vec3(0.0, 1.0, 0.0))
    + sphereDensity(vec3(0.0, 0.0, -5.0), vec3(0.0, 0.0, 1.0), vec3(0.0), 1.0, 1e9)
    + invBilinear(p, vec2(0.0), vec2(2.0, 0.2), vec2(2.3, 1.8), vec2(0.1, 2.0)).x;
  s += mandelbrot2(p * 0.3, 64) + mandelbrotTrap(p * 0.3, 32)
    + mandelbulbDE(vec3(p, 0.5), 8.0, 6) + juliaQuatDE(vec3(p, 0.5), vec4(-0.2, 0.6, 0.2, 0.2), 8)
    + mengerSDF(vec3(p, 0.5), 3) + sierpinskiSDF(vec3(p, 0.5), 6);
  s += clouds2D(p, 1.0) + planeDeformPolar(p).x + planeDeformTwist(p, 0.5).y
    + feedbackBlend(vec3(0.2), vec3(0.8), 0.5).x + lifeRule(1.0, 2.0);
  s += qRotate(qFromAxisAngle(vec3(0.0, 0.0, 1.0), 1.57), vec3(p, 0.5)).y
    + qMul(vec4(0.0, 0.0, 0.0, 1.0), vec4(0.0, 0.0, 0.0, 1.0)).w + fourierSquare(0.25, 8)
    + triangleArea(vec3(0.0), vec3(1.0, 0.0, 0.0), vec3(0.0, 1.0, 0.0))
    + distToTriangle(vec3(p, 1.0), vec3(0.0), vec3(1.0, 0.0, 0.0), vec3(0.0, 1.0, 0.0))
    + sphereUV(vec3(p, 0.5)).x;
  gl_FragColor = vec4(vec3(clamp01(s * 0.01)), 1.0);
}`;

      function compile(type, src) {
        const sh = gl.createShader(type);
        gl.shaderSource(sh, src);
        gl.compileShader(sh);
        if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
          throw new Error(gl.getShaderInfoLog(sh));
        }
        return sh;
      }

      try {
        const vs = compile(gl.VERTEX_SHADER, vsSrc);
        const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
        const pr = gl.createProgram();
        gl.attachShader(pr, vs);
        gl.attachShader(pr, fs);
        gl.linkProgram(pr);
        if (!gl.getProgramParameter(pr, gl.LINK_STATUS)) {
          throw new Error('link: ' + gl.getProgramInfoLog(pr));
        }
        console.log('GLSL-SMOKE-OK …+effects+mathx (all 10 libs)');
        document.title = 'SMOKE OK';
      } catch (e) {
        console.error('GLSL-SMOKE-FAIL ' + e.message);
        document.title = 'SMOKE FAIL';
      }
    </script>
  </body>
</html>
