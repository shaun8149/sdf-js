<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Atlas · Present</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='%23ffd070'/></svg>">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <!-- Router populated by router-init.js based on URL query -->
    <div id="route-target"></div>
  </div>

  <script type="module">
    // Inline router — modes:
    //   /examples/present/                          → library page (PDF upload + list)
    //   /examples/present/?deck=<id>                → document view (Napkin paragraph ⚡)
    //   /examples/present/?deck=<id>&mode=scaffold  → scaffold view (Sprint 16 deck-level pipeline)
    const params = new URLSearchParams(location.search);
    const deckId = params.get('deck');
    const mode = params.get('mode');
    const target = document.getElementById('route-target');

    if (deckId && mode === 'scaffold') {
      const { mountScaffoldView } = await import('../../src/present/scaffold-view.js');
      await mountScaffoldView(target, deckId);
    } else if (deckId) {
      const { mountDocumentView } = await import('../../src/present/document-view.js');
      await mountDocumentView(target, deckId);
    } else {
      const { mountLibraryPage } = await import('../../src/present/library-page.js');
      await mountLibraryPage(target);
    }
  </script>
</body>
</html>
