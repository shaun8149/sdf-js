<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sdf-js — editor</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      .editor-shell { max-width: 1180px; margin: 0 auto; padding: 32px; }
      .editor-layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 32px;
        align-items: start;
      }
      .editor-pane {
        background: var(--bg-deep);
        border: 1px solid var(--rule-soft);
        padding: 20px;
      }
      .preview-pane {
        background: var(--canvas);
        padding: 16px;
      }
      .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
      .layer {
        background: var(--bg);
        border: 1px solid var(--rule-soft);
        padding: 14px 16px;
        margin-bottom: 12px;
      }
      .layer header {
        display: flex; justify-content: space-between; align-items: baseline;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--rule-soft);
      }
      .layer .type {
        font-size: 14px;
        color: var(--ink);
      }
      .layer .del {
        background: transparent;
        border: 0;
        color: var(--ink-faint);
        font-size: 18px;
        padding: 0 4px;
        cursor: pointer;
        line-height: 1;
      }
      .layer .del:hover { color: var(--accent); }
      .op-row {
        display: flex; gap: 12px; align-items: center;
        margin-bottom: 10px;
        font-size: 12px;
      }
      .op-row select {
        background: transparent;
        border: 0;
        border-bottom: 1px solid var(--rule);
        color: var(--ink);
        padding: 2px 0;
        font: inherit; font-size: 12px;
      }
      .op-row .k-row {
        flex: 1; display: flex; gap: 8px; align-items: center;
        color: var(--ink-faint);
        font-size: 12px;
      }
      .op-row .k-row .k-val {
        color: var(--ink); font-variant-numeric: tabular-nums;
        font-size: 12px;
      }
      .op-row input[type="range"] {
        flex: 1; height: 2px;
        -webkit-appearance: none; appearance: none;
        background: var(--rule);
      }
      .op-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 10px; height: 10px;
        background: var(--ink);
        border-radius: 50%;
      }
      .params {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 14px;
      }
      .params label {
        display: flex; align-items: center; gap: 10px;
        color: var(--ink-faint);
        font-size: 12px;
      }
      .params input {
        flex: 1; min-width: 0;
        background: transparent;
        border: 0;
        border-bottom: 1px solid var(--rule);
        color: var(--ink);
        padding: 3px 0;
        font: inherit; font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      .params input:focus {
        outline: none; border-bottom-color: var(--ink);
      }
      textarea#code {
        width: 100%; box-sizing: border-box;
        background: var(--bg);
        border: 1px solid var(--rule-soft);
        color: var(--accent);
        padding: 12px 14px;
        font: 11px ui-monospace, monospace;
        line-height: 1.6;
        resize: vertical;
        min-height: 120px;
        margin-top: 4px;
      }
      .code-actions {
        margin-top: 12px;
        display: flex;
        gap: 24px;
      }
      #canvas-host canvas { display: block; }
    </style>
  </head>
  <body>
    <div class="editor-shell">
      <div class="demo-meta">
        <div>
          <h1><em>editor.</em></h1>
          <p class="tagline" style="margin-bottom: 0;">
            Compose SDF layers, tune parameters, see the sand-painting preview in real time,
            copy the generated <code>sdf-js</code> code into any sketch.
          </p>
        </div>
        <div class="links">
          <a href="../index.html">index</a>
          <a href="./2d.html">2d</a>
        </div>
      </div>
      <div class="editor-layout">
        <div class="editor-pane">
          <h2>add shape</h2>
          <div class="toolbar" id="toolbar">
            <button data-add="circle">+ circle</button>
            <button data-add="rectangle">+ rectangle</button>
            <button data-add="rounded_rectangle">+ rounded</button>
            <button data-add="hexagon">+ hexagon</button>
            <button data-add="equilateral_triangle">+ triangle</button>
          </div>

          <h2>layers <span style="color:var(--ink-faint); font-weight:400; text-transform:none; letter-spacing:0;">— top to bottom</span></h2>
          <div id="layers"></div>

          <h2>generated code</h2>
          <textarea id="code" readonly></textarea>
          <div class="code-actions">
            <button id="copy">copy</button>
            <button id="reset">clear all</button>
          </div>
        </div>

        <div class="preview-pane">
          <div id="canvas-host"></div>
          <div class="actions" style="margin-top: 14px; display: flex; gap: 24px;">
            <button id="clear">clear canvas</button>
          </div>
          <div class="stats" id="stats" style="margin-top: 10px;">painting…</div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script type="module" src="./editor.js"></script>
  </body>
</html>
