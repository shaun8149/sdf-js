<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sdf-js — sand</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="page" style="max-width: 820px;">
      <div class="demo-meta">
        <div>
          <h1><em>sand.</em></h1>
          <p class="tagline" style="margin-bottom: 0;">
            One thousand random samples per frame, classified against the SDFs.
            Orange outside, white near boundary, palette colours inside each layer.
            Dots accumulate.
          </p>
        </div>
        <div class="links">
          <a href="../index.html">index</a>
          <a href="./render-showcase.html">showcase</a>
        </div>
      </div>
      <div class="stage">
        <div id="canvas-host"></div>
      </div>
      <div class="stats" id="stats">sand painting…</div>
      <div class="legend" id="legend"></div>
      <div class="actions" style="display: flex; gap: 24px; margin-top: 22px; flex-wrap: wrap;">
        <button data-scene="1">1 · cactus</button>
        <button data-scene="2">2 · tree &amp; boat</button>
        <button data-scene="3">3 · bridge</button>
        <button data-scene="4">4 · buildings (far)</button>
        <button data-scene="5">5 · buildings (near)</button>
        <button data-scene="6">6 · brick wall</button>
        <button data-scene="7">7 · bird</button>
        <span style="flex: 1;"></span>
        <button id="re">randomize</button>
        <button id="clear">clear</button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script type="module" src="./scenes-sand.js"></script>
  </body>
</html>
