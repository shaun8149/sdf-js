<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sdf-js — scenes debug</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="page" style="max-width: 820px;">
      <div class="demo-meta">
        <div>
          <h1><em>scenes debug.</em></h1>
          <p class="tagline" style="margin-bottom: 0;">
            Plain layered silhouette across all seven scenes — one colour per SDF.
            Useful for verifying geometry while authoring new shapes.
          </p>
        </div>
        <div class="links">
          <a href="../index.html">index</a>
          <a href="./painted-scenes.html">painted</a>
        </div>
      </div>
      <div class="stage">
        <canvas id="c" width="720" height="720"></canvas>
      </div>
      <div class="stats" id="stats">rendering…</div>
      <div class="legend" id="legend"></div>
      <div class="actions" style="display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap;">
        <strong style="font-size: 0.85em; opacity: 0.7; align-self: center;">BOB:</strong>
        <button data-scene="1">1 · cactus</button>
        <button data-scene="2">2 · tree &amp; boat</button>
        <button data-scene="3">3 · bridge</button>
        <button data-scene="4">4 · buildings (far)</button>
        <button data-scene="5">5 · buildings (near)</button>
        <button data-scene="6">6 · brick wall</button>
        <button data-scene="7">7 · bird</button>
      </div>
      <div class="actions" style="display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap;">
        <strong style="font-size: 0.85em; opacity: 0.7; align-self: center;">LLM v2:</strong>
        <button data-scene="8">8 · tree</button>
        <button data-scene="9">9 · boat</button>
        <button data-scene="10">10 · cathedral</button>
        <button data-scene="11">11 · butterfly</button>
        <button data-scene="12">12 · hatman</button>
        <button data-scene="13">13 · dance</button>
        <button data-scene="14">14 · seurat</button>
        <span style="flex: 1;"></span>
        <button id="re">randomize</button>
      </div>
    </div>
    <script type="module" src="./scenes-debug.js"></script>
  </body>
</html>
