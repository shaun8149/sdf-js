<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sdf-js — BOB scenes 1–6 (silhouette debug)</title>
    <style>
      :root { color-scheme: dark; }
      body {
        background: #111;
        color: #ddd;
        font: 13px ui-monospace, "SF Mono", monospace;
        margin: 0 auto;
        padding: 24px;
        max-width: 800px;
      }
      h1 { margin: 0 0 8px; font-size: 16px; font-weight: 600; }
      p.meta { color: #888; margin: 0 0 24px; line-height: 1.6; }
      a { color: #88c0ff; text-decoration: none; }
      .stage {
        background: #0a0a0a;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 16px;
        max-width: 720px;
        margin: 0 auto;
      }
      canvas { display: block; width: 100%; height: auto; border-radius: 4px; image-rendering: pixelated; }
      .stats { margin-top: 8px; color: #666; font-size: 11px; }
      button {
        background: #1a1a1a;
        border: 1px solid #444;
        color: #ddd;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font: inherit;
      }
      button:hover { background: #222; border-color: #88c0ff; }
      .legend { margin-top: 8px; font-size: 11px; color: #888; line-height: 1.5; }
      .legend-swatch {
        display: inline-block; width: 12px; height: 12px;
        vertical-align: middle; border-radius: 2px;
        margin-right: 4px;
      }
    </style>
  </head>
  <body>
    <h1>BOB scenes 1–6 — silhouette debug</h1>
    <p class="meta">
      跟 cactus.html 一样的简单像素渲染：每个 SDF 一种颜色，按图层顺序 alpha 合成。
      不走 BOB 的笔触 pipeline，专门用来肉眼检查每个 SDF 的几何形状对不对。<br>
      建筑（scene 4/5）这里是<strong>未反转的标准 SDF</strong>（直接看形状，
      不是 BOB 的负空间染色）。
      <a href="./painted-scenes.html">→ painted 笔触版</a>
    </p>
    <div class="stage">
      <canvas id="c" width="720" height="720"></canvas>
      <div class="stats" id="stats">rendering…</div>
      <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
        <button data-scene="1">1 仙人掌</button>
        <button data-scene="2">2 花树+船</button>
        <button data-scene="3">3 拱桥</button>
        <button data-scene="4">4 建筑(远)</button>
        <button data-scene="5">5 建筑(近)</button>
        <button data-scene="6">6 砖墙</button>
        <button data-scene="7" style="border-color:#0a8;">7 鸟</button>
        <button id="re" style="margin-left:auto; border-color:#88c0ff;">随机刷新</button>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <script type="module" src="./scenes-debug.js"></script>
  </body>
</html>
