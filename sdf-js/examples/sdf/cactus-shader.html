<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sdf-js — cactus, shader</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      details { margin-top: 32px; }
      details > summary {
        cursor: pointer;
        font-size: 14px;
        color: var(--ink-faint);
        margin-bottom: 12px;
      }
      details > summary:hover { color: var(--ink); }
      details pre {
        background: var(--bg-deep);
        border: 0;
        border-left: 1px solid var(--rule);
        padding: 16px 18px;
        font-size: 11px;
        overflow-x: auto;
        max-height: 420px;
        margin: 0;
        color: var(--ink-soft);
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <div class="page" style="max-width: 1100px;">
      <div class="demo-meta">
        <div>
          <h1><em>cactus, shader.</em></h1>
          <p class="tagline" style="margin-bottom: 0;">
            The same scene evaluated by a fragment shader.
            Each primitive in <code>src/sdf/d2.js</code> has a GLSL mirror in
            <code>sdf2.glsl.js</code>.
          </p>
        </div>
        <div class="links">
          <a href="../index.html">index</a>
          <a href="./cactus.html">js version</a>
        </div>
      </div>
      <div class="stage">
        <canvas id="c" width="1024" height="1024"></canvas>
      </div>
      <div class="stats" id="stats">compiling shader…</div>

      <details>
        <summary>View compiled fragment shader</summary>
        <pre id="shader-source"></pre>
      </details>
    </div>
    <script type="module" src="./cactus-shader.js"></script>
  </body>
</html>
