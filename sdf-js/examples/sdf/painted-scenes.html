<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sdf-js — BOB scenes 1–6 (random)</title>
    <style>
      :root { color-scheme: dark; }
      body {
        background: #111;
        color: #ddd;
        font: 13px ui-monospace, "SF Mono", monospace;
        margin: 0 auto;
        padding: 24px;
        max-width: 800px;
      }
      h1 { margin: 0 0 8px; font-size: 16px; font-weight: 600; }
      p.meta {
        color: #888;
        margin: 0 0 24px;
        line-height: 1.6;
      }
      a { color: #88c0ff; text-decoration: none; }
      .stage {
        background: #0a0a0a;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 16px;
        max-width: 720px;
        margin: 0 auto;
      }
      canvas { display: block; border-radius: 4px; }
      .stats { margin-top: 8px; color: #666; font-size: 11px; }
      button {
        margin-top: 8px;
        background: #1a1a1a;
        border: 1px solid #444;
        color: #ddd;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font: inherit;
      }
      button:hover { background: #222; border-color: #88c0ff; }
    </style>
  </head>
  <body>
    <h1>BOB scenes 1–6 — 笔触风格（随机派发）</h1>
    <p class="meta">
      把 BOB 的 6 个 2D 场景全部用新 sdf-js 重写。每次刷新随机抽一个场景：<br>
      <strong>1</strong> 仙人掌 + 十字门 ·
      <strong>2</strong> 花树 + 帆船 ·
      <strong>3</strong> 拱桥 ·
      <strong>4/5</strong> 建筑群（远 / 近） ·
      <strong>6</strong> 砖墙
      <br>
      <a href="./cactus-painted.html">← 单场景版（仙人掌）</a> &nbsp;·&nbsp;
      <a href="./2d.html">2D demo</a>
    </p>
    <div class="stage">
      <div id="canvas-host"></div>
      <div class="stats" id="stats">painting…</div>
      <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
        <button data-scene="1">1 仙人掌</button>
        <button data-scene="2">2 花树+船</button>
        <button data-scene="3">3 拱桥</button>
        <button data-scene="4">4 建筑(远)</button>
        <button data-scene="5">5 建筑(近)</button>
        <button data-scene="6">6 砖墙</button>
        <button data-scene="7" style="border-color:#0a8;">7 鸟</button>
        <button id="re" style="margin-left:auto; border-color:#88c0ff;">随机刷新</button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script type="module" src="./painted-scenes.js"></script>
  </body>
</html>
