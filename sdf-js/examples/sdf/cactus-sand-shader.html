<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sdf-js — cactus, sand shader</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="page" style="max-width: 820px;">
      <div class="demo-meta">
        <div>
          <h1><em>cactus, sand shader.</em></h1>
          <p class="tagline" style="margin-bottom: 0;">
            Sand-painting accumulation as a shader: each pixel takes a hashed dice roll per frame,
            chosen ones get an SDF colour, the rest <code>discard</code>.
            <code>preserveDrawingBuffer</code> keeps prior frames.
          </p>
        </div>
        <div class="links">
          <a href="../index.html">index</a>
          <a href="./scenes-sand.html">js sand</a>
        </div>
      </div>
      <div class="stage">
        <canvas id="c" width="720" height="720"></canvas>
      </div>
      <div class="stats" id="stats">grain rate · frames painted</div>
      <div class="actions" style="display: flex; gap: 24px; margin-top: 22px; align-items: center; flex-wrap: wrap;">
        <button id="reset">clear</button>
        <button id="pause">pause</button>
        <label style="display: flex; gap: 10px; align-items: center; font-size: 13px; color: var(--ink-faint);">
          rate per frame
          <input id="rate" type="range" min="0.001" max="0.05" step="0.001" value="0.005" />
          <span id="rate-val" class="mono">0.5%</span>
        </label>
      </div>
    </div>
    <script type="module" src="./cactus-sand-shader.js"></script>
  </body>
</html>
