<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sdf-js — ca animate</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      .stage canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div class="demo-shell">
      <div class="demo-meta">
        <div>
          <h1><em>ca, animate.</em></h1>
          <p class="tagline" style="margin-bottom: 0;">
            kjetil's scatter-then-assemble animation: <code>caShuffle()</code> pushes
            each rectangle along neighbour directions and records a path; the path is
            then played backwards to settle into the SDF.
          </p>
        </div>
        <div class="links">
          <a href="../index.html">index</a>
          <a href="./ca.html">static</a>
        </div>
      </div>

      <div class="demo-layout split" style="grid-template-columns: 320px 1fr;">
        <div class="controls">
          <h2>shape</h2>
          <label style="margin-bottom: 14px;">
            <select id="shape">
              <option value="robot" selected>robot</option>
              <option value="ring">ring</option>
              <option value="circle">circle</option>
              <option value="ellipse">ellipse</option>
              <option value="hexagon">hexagon</option>
              <option value="figure_eight">figure 8</option>
              <option value="cross">cross</option>
              <option value="rounded">rounded square</option>
            </select>
          </label>

          <h2>animation</h2>
          <label>
            <span class="row">frames <span class="val" id="fv">200</span></span>
            <input id="frames" type="range" min="60" max="400" step="10" value="200" />
          </label>
          <label>
            <span class="row">movement length <span class="val" id="mv">0.82</span></span>
            <input id="movement" type="range" min="0.5" max="0.99" step="0.01" value="0.82" />
          </label>
          <div class="checkboxes">
            <label><input id="symmetric" type="checkbox" checked /> symmetric motion</label>
          </div>

          <h2>ca parameters</h2>
          <label>
            <span class="row">grid dim <span class="val" id="gv">288</span></span>
            <input id="gridDim" type="range" min="60" max="320" step="4" value="288" />
          </label>
          <label>
            <span class="row">roundness <span class="val" id="rv">0.00</span></span>
            <input id="roundness" type="range" min="0" max="1" step="0.01" value="0" />
          </label>

          <div class="actions">
            <button id="rebuild">regenerate</button>
            <button id="pause">pause</button>
          </div>
        </div>

        <div>
          <div class="stage">
            <canvas id="c" width="1500" height="1500"></canvas>
          </div>
          <div class="stats" id="stats" style="padding: 12px 0;">building…</div>
        </div>
      </div>
    </div>
    <script type="module" src="./ca-animate.js"></script>
  </body>
</html>
