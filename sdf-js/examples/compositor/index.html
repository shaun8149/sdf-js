<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Atlas · Compositor</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='%23ffd070'/></svg>">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
                 font-family: -apple-system, system-ui, sans-serif;
                 background: #0d0d0d; color: #ccc; }

    body { overflow-y: auto; }
    #app { display: grid; grid-template-rows: 44px auto auto 28px; min-height: 100vh; }

    /* ============ Top bar ============ */
    #topbar {
      display: flex; align-items: stretch;
      background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    }
    #brand {
      padding: 0 16px; display: flex; align-items: center;
      font-weight: 700; font-size: 15px; color: #ffd070;
      border-right: 1px solid #2a2a2a;
    }
    #brand .sub { color: #888; font-weight: 400; margin-left: 6px; font-size: 12px; }
    #tabs { display: flex; flex: 1; }
    .tab {
      padding: 0 18px; display: flex; align-items: center; gap: 6px;
      background: none; border: none; color: #888; cursor: pointer;
      font-size: 13px; font-family: inherit;
      border-right: 1px solid #2a2a2a;
    }
    .tab .icon { opacity: 0.7; }
    .tab:hover { background: #222; color: #ddd; }
    .tab.active { background: #0d0d0d; color: #ffd070; }
    .tab.stub { opacity: 0.4; cursor: not-allowed; }
    .tab.stub:hover { background: none; color: #888; }
    .stub-badge {
      background: #3a3a3a; color: #888; font-size: 9px; padding: 1px 5px;
      border-radius: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    /* ============ Scenes tab: full-width gallery layout ============ */
    body.scenes-mode #main { grid-template-columns: 1fr; }
    body.scenes-mode #render-area { display: none; }
    body.scenes-mode #code-screen { display: none; }
    body.scenes-mode #tab-content {
      padding: 32px 48px; background: #0d0d0d; border-right: none;
      overflow-y: auto; max-height: calc(100vh - 44px - 28px);
    }
    body.scenes-mode #tab-content > * { max-width: 1400px; margin-left: auto; margin-right: auto; }

    .scenes-hero {
      text-align: center; padding: 8px 0 28px;
      border-bottom: 1px solid #2a2a2a; margin-bottom: 28px;
    }
    .scenes-hero h1 {
      margin: 0 0 6px; color: #ffd070; font-size: 28px;
      font-weight: 700; letter-spacing: -0.01em;
    }
    .scenes-hero p {
      margin: 0; color: #aaa; font-size: 14px; line-height: 1.5;
    }
    .scenes-hero p .cta {
      color: #ffd070; cursor: pointer; text-decoration: underline;
    }

    .scenes-section { margin-bottom: 36px; }
    .scenes-section-title {
      color: #ddd; font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 0 0 14px; padding-bottom: 6px;
      border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 10px;
    }
    .scenes-section-title .count {
      background: #2a2a2a; color: #aaa; font-weight: 400;
      padding: 2px 8px; border-radius: 10px; font-size: 11px;
    }
    .scenes-section-title .header-btn {
      padding: 4px 10px; background: #2a2a2a; color: #aaa;
      border: 1px solid #3a3a3a; border-radius: 3px;
      cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 500;
      text-transform: none; letter-spacing: 0;
    }
    .scenes-section-title .header-btn:hover {
      background: #3a3a3a; color: #ffd070; border-color: #ffd070;
    }

    .scenes-grid-big {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    }
    @media (max-width: 1100px) {
      .scenes-grid-big { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 800px) {
      .scenes-grid-big { grid-template-columns: repeat(2, 1fr); }
    }

    .scene-card-big {
      position: relative; aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
      border: 1px solid #2a2a2a; border-radius: 6px;
      cursor: pointer; transition: all 0.15s;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .scene-card-big:hover {
      /* Hover: subtle warm-gray accent so it doesn't read as "selected" */
      border-color: #6a6a55; transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 208, 112, 0.08);
    }
    .scene-card-big.active {
      /* Active = currently-loaded demo. Stronger weight than hover: 2px yellow
         border + soft outer glow. Mutual exclusion with hover styling makes
         "which scene is loaded" unambiguous even while pointer is over a different card. */
      border: 2px solid #ffd070;
      box-shadow: 0 0 0 1px rgba(255, 208, 112, 0.35), 0 6px 24px rgba(255, 208, 112, 0.25);
    }
    .scene-card-big.active:hover {
      /* Active card stays yellow on hover; only lift slightly */
      transform: translateY(-2px);
    }
    .scene-card-big.saved { border-color: #2a3a2a; }
    .scene-card-big.saved:hover { border-color: #7fa97f; }
    .scene-card-big .scene-emoji {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: 48px; opacity: 0.6;
    }
    .scene-card-big .scene-footer {
      padding: 12px 14px; background: rgba(0,0,0,0.4);
      border-top: 1px solid #2a2a2a;
    }
    .scene-card-big .scene-title {
      color: #fff; font-size: 14px; font-weight: 600;
      margin: 0 0 3px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }
    .scene-card-big .scene-sub {
      color: #888; font-size: 11px; font-family: ui-monospace, monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .scene-card-big.pending .scene-emoji::after {
      content: ' ✎'; font-size: 24px; color: #ffd070;
      position: absolute; top: 10px; right: 12px;
    }
    .scene-card-big.ready .scene-emoji::after,
    .scene-card-big.saved .scene-emoji::after {
      content: ' ▶'; font-size: 18px; color: #afd9af;
      position: absolute; top: 10px; right: 12px;
    }
    .scene-card-big .scene-actions {
      position: absolute; bottom: 12px; right: 12px;
      display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s;
    }
    .scene-card-big:hover .scene-actions { opacity: 1; }
    .scene-card-big .scene-act-btn {
      background: rgba(0,0,0,0.6); border: 1px solid #3a3a3a; color: #ddd;
      width: 28px; height: 28px; border-radius: 3px; cursor: pointer;
      font-size: 13px; display: flex; align-items: center; justify-content: center;
    }
    .scene-card-big .scene-act-btn:hover { background: #ffd070; color: #1a1a1a; border-color: #ffd070; }

    .scenes-empty {
      padding: 30px; text-align: center; color: #666; font-style: italic;
      font-size: 13px; line-height: 1.6;
      background: #0d0d0d; border: 1px dashed #2a2a2a; border-radius: 4px;
    }

    #shared-banner {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: #1f1f1a; border: 1px solid #ffd070; border-radius: 4px;
      padding: 10px 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 999; font-size: 12px; color: #ddd;
      display: none; align-items: center; gap: 14px;
    }
    #shared-banner.open { display: flex; }
    #shared-banner b { color: #ffd070; font-weight: 600; }
    #shared-banner button {
      padding: 5px 12px; background: #ffd070; color: #1a1a1a;
      border: none; border-radius: 3px; cursor: pointer;
      font-size: 11px; font-weight: 600; font-family: inherit;
    }
    #shared-banner button.dismiss {
      background: #2a2a2a; color: #888;
    }

    /* ============ Renderer pills in topbar (right side) ============ */
    #render-controls {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      padding: 0 14px; border-left: 1px solid #2a2a2a;
    }
    body.scenes-mode #render-controls { display: none; }

    /* ============ Main area (split) — first screen ============ */
    #main {
      display: grid; grid-template-columns: 360px 1fr;
      height: calc(100vh - 44px - 28px);
      min-height: 0;
    }

    /* Tab content panel (left) */
    #tab-content {
      background: #1a1a1a; border-right: 1px solid #2a2a2a;
      padding: 14px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
    }
    #tab-content h2 { margin: 0 0 4px; font-size: 14px; color: #fff; }
    #tab-content h3 { margin: 12px 0 4px; font-size: 11px; color: #ffd070;
                      text-transform: uppercase; letter-spacing: 0.05em; }
    #tab-content p { margin: 4px 0; color: #888; font-size: 12px; line-height: 1.5; }
    #tab-content .placeholder {
      padding: 24px 16px; background: #0d0d0d; border: 1px dashed #3a3a3a;
      border-radius: 4px; color: #666; font-size: 12px; line-height: 1.6;
    }

    /* Render area (right) — single row, canvas fills 100% */
    #render-area { display: block; min-height: 0; min-width: 0; }
    #canvas-wrap {
      position: relative; background: #000;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      min-height: 0; min-width: 0;
    }
    #canvas-wrap canvas {
      display: block; background: #fff;
      max-width: 100%; max-height: 100%;
      width: auto; height: auto;
    }

    .pill-group { display: flex; gap: 0; align-items: stretch; }
    .pill {
      padding: 4px 11px; background: #2a2a2a; color: #aaa;
      border: 1px solid #3a3a3a; cursor: pointer; font-size: 11px; font-family: inherit;
      transition: background 0.1s;
    }
    .pill:first-child { border-radius: 3px 0 0 3px; }
    .pill:last-child { border-radius: 0 3px 3px 0; }
    .pill:not(:first-child) { border-left: none; }
    .pill:hover { background: #3a3a3a; color: #ddd; }
    .pill.active { background: #ffd070; color: #1a1a1a; border-color: #ffd070; }

    /* ============ Second screen: code panel ============ */
    #code-screen {
      padding: 20px 24px; background: #0d0d0d;
      border-top: 1px solid #2a2a2a;
      display: flex; flex-direction: column; gap: 12px;
      min-height: calc(100vh - 44px - 28px);
    }
    #code-header {
      display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
      padding-bottom: 8px; border-bottom: 1px solid #2a2a2a;
    }
    #code-header h2 { margin: 0; font-size: 14px; color: #fff; }
    #code-header .selected-prompt {
      color: #ffd070; font-style: italic; font-size: 13px;
      max-width: 600px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #code-header .code-meta { color: #666; font-family: ui-monospace, monospace; font-size: 11px; }
    #code-header .right { margin-left: auto; display: flex; gap: 8px; }
    .icon-btn {
      padding: 4px 10px; background: #2a2a2a; color: #aaa;
      border: 1px solid #3a3a3a; border-radius: 3px; cursor: pointer;
      font-size: 11px; font-family: inherit;
    }
    .icon-btn:hover { background: #3a3a3a; color: #ddd; }
    #code-panes {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      flex: 1; min-height: 60vh;
    }
    .code-pane {
      display: flex; flex-direction: column; gap: 6px; min-width: 0;
    }
    .code-pane-header {
      display: flex; align-items: baseline; gap: 10px;
    }
    .code-pane-label {
      color: #ffd070; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .code-pane-meta {
      color: #666; font-family: ui-monospace, monospace; font-size: 10px;
    }
    .code-pane-header .right { margin-left: auto; display: flex; gap: 6px; }
    .code-pane textarea {
      flex: 1; min-height: 60vh; width: 100%;
      padding: 14px 16px; background: #07070a; color: #d0d0d0;
      border: 1px solid #2a2a2a; border-radius: 3px;
      font-family: ui-monospace, monospace; font-size: 12px;
      line-height: 1.55; resize: vertical;
      tab-size: 2;
      box-sizing: border-box; outline: none;
    }
    .code-pane textarea:focus {
      border-color: #ffd070;
      box-shadow: inset 0 0 0 1px #ffd07033;
    }
    .code-pane textarea::placeholder { color: #555; font-style: italic; }

    /* ============ Canvas overlay buttons (top-right) ============ */
    .canvas-overlay-btn {
      position: absolute; z-index: 10;
      padding: 6px 10px; background: rgba(26, 26, 26, 0.78);
      color: #ddd; border: 1px solid #3a3a3a; border-radius: 3px;
      cursor: pointer; font-size: 12px; font-family: inherit;
      display: none;  /* shown only when a GPU renderer is active */
    }
    .canvas-overlay-btn:hover { background: rgba(58, 58, 58, 0.9); color: #ffd070; }
    #btn-fullscreen      { top: 12px; right: 12px; }

    /* ============ Sprint 2: Camera sequence timeline scrubber ============ */
    #timeline-bar {
      position: absolute; left: 12px; right: 12px; bottom: 12px; z-index: 10;
      display: none;  /* shown only when scene has cameraSequence */
      align-items: center; gap: 8px;
      padding: 6px 10px; background: rgba(26, 26, 26, 0.85);
      border: 1px solid #3a3a3a; border-radius: 4px;
      color: #ddd; font-size: 12px;
      backdrop-filter: blur(4px);
    }
    #timeline-bar button {
      background: rgba(58, 58, 58, 0.6); border: 1px solid #3a3a3a;
      color: #ddd; border-radius: 3px; padding: 3px 7px;
      cursor: pointer; font-size: 12px; font-family: inherit;
    }
    #timeline-bar button:hover { color: #ffd070; }
    #timeline-time { font-variant-numeric: tabular-nums; min-width: 84px; opacity: 0.75; }
    #timeline-scrubber {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; background: #3a3a3a; border-radius: 2px;
      outline: none; cursor: pointer;
    }
    #timeline-scrubber::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: #ffd070; cursor: pointer;
    }
    #timeline-scrubber::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: #ffd070; cursor: pointer; border: none;
    }
    #timeline-loop.active { color: #ffd070; }
    #btn-shuffle-palette { top: 12px; right: 138px; }
    #btn-new-style       { top: 12px; right: 264px; }

    /* ============ Light controls panel (top-left of canvas, GPU only) ============ */
    #light-panel {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(26, 26, 26, 0.82);
      border: 1px solid #3a3a3a; border-radius: 3px;
      padding: 0;
      min-width: 240px;
      display: none;  /* shown only when a GPU renderer is active */
      font-family: inherit; font-size: 11px;
      user-select: none;
    }
    #light-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; cursor: pointer;
      color: #ddd;
    }
    #light-panel-header:hover { color: #ffd070; }
    #light-panel-header .label { font-weight: 600; letter-spacing: 0.04em; }
    #light-panel-header .toggle { opacity: 0.6; font-size: 10px; }
    #light-panel-body {
      display: none;
      padding: 4px 10px 10px 10px;
      border-top: 1px solid #2a2a2a;
    }
    #light-panel.open #light-panel-body { display: block; }
    .light-slider-row {
      display: grid;
      grid-template-columns: 60px 1fr 38px;
      align-items: center; gap: 8px;
      margin: 6px 0;
    }
    .light-slider-row label { color: #aaa; font-size: 10px; }
    .light-slider-row input[type=range] { width: 100%; }
    .light-slider-row .value { color: #ffd070; font-size: 10px; text-align: right; font-variant-numeric: tabular-nums; }
    .light-presets {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
    }
    .light-preset-chip {
      padding: 3px 7px; background: #2a2a2a; color: #bbb;
      border: 1px solid #3a3a3a; border-radius: 3px;
      cursor: pointer; font-size: 10px; font-family: inherit;
    }
    .light-preset-chip:hover { background: #3a3a3a; color: #ffd070; border-color: #ffd070; }
    .light-reset {
      margin-top: 6px; width: 100%;
      padding: 4px; background: transparent; color: #777;
      border: 1px solid #2a2a2a; border-radius: 3px;
      cursor: pointer; font-size: 10px; font-family: inherit;
    }
    .light-reset:hover { color: #ffd070; border-color: #ffd070; }
    #canvas-wrap:fullscreen,
    #canvas-wrap:-webkit-full-screen {
      background: #000; padding: 0;
    }
    #canvas-wrap:fullscreen canvas,
    #canvas-wrap:-webkit-full-screen canvas {
      max-width: 100vw; max-height: 100vh;
    }

    /* ============ Scenes browser (bundled + saved) ============ */
    #demo-gallery {
      display: flex; flex-direction: column; gap: 12px;
    }
    .scenes-subsection {
      display: flex; flex-direction: column; gap: 6px;
    }
    .scenes-subheader {
      color: #888; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding-bottom: 4px; border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 6px;
    }
    .scenes-count {
      background: #2a2a2a; color: #888; font-weight: 400;
      padding: 1px 6px; border-radius: 8px; font-size: 9px;
    }
    .scenes-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .demo-card {
      position: relative;
      padding: 8px 10px; background: #0d0d0d; border: 1px solid #2a2a2a;
      border-radius: 3px; cursor: pointer; transition: all 0.1s;
      display: flex; flex-direction: column; gap: 3px;
      min-height: 56px; justify-content: space-between;
    }
    .demo-card:hover { border-color: #ffd070; background: #131312; }
    .demo-card.active { border-color: #ffd070; background: #1f1a10; }
    .demo-card .demo-title {
      color: #ddd; font-size: 12px; font-weight: 500; line-height: 1.2;
      padding-right: 28px; /* leave room for actions */
    }
    .demo-card .demo-thesis {
      color: #888; font-size: 9px; font-family: ui-monospace, monospace;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .demo-card.pending .demo-title { color: #aaa; }
    .demo-card.pending .demo-thesis::before { content: '✎ '; color: #ffd070; }
    .demo-card.ready .demo-thesis::before { content: '▶ '; color: #afd9af; }
    .demo-card.saved { border-color: #2a3a2a; }
    .demo-card.saved:hover { border-color: #7fa97f; }
    .demo-card.saved.active { border-color: #7fa97f; background: #14191a; }
    .demo-card.saved .demo-thesis::before { content: '💾 '; }
    .saved-actions {
      position: absolute; top: 6px; right: 6px;
      display: flex; gap: 2px;
    }
    .saved-act-btn {
      background: none; border: none; color: #666;
      cursor: pointer; font-size: 13px; line-height: 1;
      padding: 2px 5px; border-radius: 2px;
    }
    .saved-act-btn:hover { color: #ffd070; background: rgba(255, 208, 112, 0.1); }
    .demo-gallery-note {
      font-size: 10px; color: #666; margin-top: 6px; line-height: 1.4;
    }

    /* ============ History list ============ */
    #history-list {
      display: flex; flex-direction: column; gap: 2px;
      max-height: 380px; overflow-y: auto;
      background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 3px;
    }
    .history-item {
      padding: 8px 10px; border-bottom: 1px solid #1f1f1f;
      cursor: pointer; transition: background 0.1s;
      display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: #1a1a1a; }
    .history-item.active { background: #1f1f1f; border-left: 2px solid #ffd070; padding-left: 8px; }
    .history-prompt {
      color: #ccc; font-size: 12px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .history-time { color: #555; font-size: 10px; font-family: ui-monospace, monospace; }
    .history-del {
      padding: 1px 6px; background: none; border: none; color: #555;
      cursor: pointer; font-size: 13px; line-height: 1;
    }
    .history-del:hover { color: #d9afaf; }
    .history-empty { padding: 16px; color: #555; font-size: 12px; text-align: center; font-style: italic; }
    .history-clear {
      align-self: flex-end; background: none; border: none; color: #666;
      cursor: pointer; font-size: 10px; padding: 4px 0; text-decoration: underline;
    }
    .history-clear:hover { color: #aaa; }

    /* ============ Status bar ============ */
    #statusbar {
      display: flex; align-items: center; padding: 0 14px;
      background: #1a1a1a; border-top: 1px solid #2a2a2a;
      font-family: ui-monospace, monospace; font-size: 11px;
      color: #888; gap: 16px; min-width: 0;
    }
    #statusbar .scene-info { color: #ffd070; }
    #statusbar .fps { color: #afd9af; }
    #statusbar .right { margin-left: auto; color: #666; }
    #statusbar .err { color: #d9afaf; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top bar: brand + tabs -->
    <div id="topbar">
      <div id="brand">Atlas <span class="sub">· Compositor v0</span></div>
      <div id="tabs">
        <button class="tab active" data-tab="scenes">
          <span class="icon">▤</span> Scenes
        </button>
        <button class="tab" data-tab="text">
          <span class="icon">✎</span> Text
        </button>
        <button class="tab" data-tab="generator">
          <span class="icon">⚂</span> Generator
        </button>
        <button class="tab stub" data-tab="2d-edit" disabled>
          <span class="icon">▣</span> 2D Edit
          <span class="stub-badge">M3</span>
        </button>
        <button class="tab stub" data-tab="3d-edit" disabled>
          <span class="icon">⌬</span> 3D Edit
          <span class="stub-badge">M4</span>
        </button>
      </div>
      <!-- Renderer pills, right-aligned in topbar so the canvas below fills full height -->
      <div id="render-controls">
        <div class="pill-group" id="renderer-pills">
          <button class="pill active" data-renderer="silhouette">Silhouette</button>
          <button class="pill" data-renderer="stipple">Stipple</button>
          <button class="pill" data-renderer="hatch">Lines</button>
          <button class="pill" data-renderer="fly3d">FLY 3D</button>
          <button class="pill" data-renderer="bob-gpu">BOB GPU</button>
          <button class="pill" data-renderer="blueprint">Blueprint</button>
        </div>
      </div>
    </div>

    <!-- Banner: viewing a scene loaded from a #scene= URL -->
    <div id="shared-banner">
      <span>🔗 Viewing a <b>shared scene</b> from URL. Save to your library?</span>
      <button id="btn-save-shared">✨ Save</button>
      <button id="btn-dismiss-shared" class="dismiss">Dismiss</button>
    </div>

    <!-- Main area: tab content (left) + render canvas (right) -->
    <div id="main">
      <div id="tab-content" data-active-tab="text">
        <!-- Tab content gets injected by JS based on active tab -->
      </div>

      <div id="render-area">
        <div id="canvas-wrap">
          <!-- Two canvases: #c (canvas2D) for text-tab silhouette/stipple/hatch,
               #c-gpu (WebGL) for BOB GPU + FLY 3D shaders. Only one visible at a time. -->
          <canvas id="c" width="900" height="900"></canvas>
          <canvas id="c-gpu" width="900" height="900" style="display:none;"></canvas>

          <!-- Light control panel (top-left, GPU renderers only) -->
          <div id="light-panel">
            <div id="light-panel-header">
              <span class="label">🌅 Light</span>
              <span class="toggle">▼ click to expand</span>
            </div>
            <div id="light-panel-body">
              <div class="light-slider-row">
                <label for="light-azim">Azimuth</label>
                <input id="light-azim" type="range" min="-3.14" max="3.14" step="0.05">
                <span class="value" id="light-azim-val">0.50</span>
              </div>
              <div class="light-slider-row">
                <label for="light-alt">Altitude</label>
                <input id="light-alt" type="range" min="0.05" max="1.50" step="0.02">
                <span class="value" id="light-alt-val">0.70</span>
              </div>
              <div class="light-slider-row">
                <label for="light-dist">Distance</label>
                <input id="light-dist" type="range" min="5" max="60" step="1">
                <span class="value" id="light-dist-val">30</span>
              </div>
              <div class="light-presets">
                <button class="light-preset-chip" data-preset="goldenHour">Golden Hour</button>
                <button class="light-preset-chip" data-preset="midday">Midday</button>
                <button class="light-preset-chip" data-preset="sideLight">Side Light</button>
                <button class="light-preset-chip" data-preset="dusk">Dusk</button>
              </div>
              <button class="light-reset" id="light-reset">↺ Reset to scene default</button>
            </div>
          </div>

          <button id="btn-new-style" class="canvas-overlay-btn" title="Regenerate BOB GPU style from new styleHash (Shift+S)">🎲 New style <span style="opacity:0.6;">⇧S</span></button>
          <button id="btn-shuffle-palette" class="canvas-overlay-btn" title="Shuffle BOB GPU palette (S)">🎨 Shuffle <span style="opacity:0.6;">S</span></button>
          <button id="btn-fullscreen" class="canvas-overlay-btn" title="Toggle fullscreen (press F)">⛶ Fullscreen <span style="opacity:0.6;">F</span></button>

          <!-- Sprint 2: Camera sequence timeline scrubber (FLY 3D + scene has cameraSequence) -->
          <div id="timeline-bar">
            <button id="timeline-play" title="Play / Pause (space)">▶</button>
            <input id="timeline-scrubber" type="range" min="0" max="1000" value="0">
            <span id="timeline-time">0:00 / 0:00</span>
            <button id="timeline-loop" class="active" title="Toggle loop">↻</button>
            <button id="timeline-record" title="录制 1 轮 sequence 为视频 (.webm)">⏺</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Second screen: full-width code panel, split 2D / 3D -->
    <div id="code-screen">
      <div id="code-header">
        <h2>Generated code</h2>
        <span class="selected-prompt" id="selected-prompt"></span>
        <span class="code-meta" id="code-meta"></span>
      </div>
      <div id="code-panes">
        <!-- Left: 2D SDF JS code -->
        <div class="code-pane">
          <div class="code-pane-header">
            <span class="code-pane-label">2D SDF · JavaScript</span>
            <span class="code-pane-meta" id="code-2d-meta"></span>
            <div class="right">
              <button class="icon-btn" id="btn-copy-code" title="Copy 2D code">⎘ Copy</button>
              <button class="icon-btn" id="btn-rerender" title="Re-execute the 2D code (⌘↵)">↻ Re-run <span style="opacity:0.6;">⌘↵</span></button>
            </div>
          </div>
          <textarea id="code-display" spellcheck="false"
                    placeholder="(no 2D code yet — Generate or pick a history item. Edit + ⌘↵ to re-execute.)"></textarea>
        </div>

        <!-- Right: 3D SceneData JSON -->
        <div class="code-pane">
          <div class="code-pane-header">
            <span class="code-pane-label">3D Scene · SceneData v1 JSON</span>
            <span class="code-pane-meta" id="code-3d-meta"></span>
            <div class="right">
              <button class="icon-btn" id="btn-copy-scene" title="Copy SceneData JSON">⎘ Copy</button>
              <button class="icon-btn" id="btn-rerun-scene" title="Re-compile + render SceneData (⌘↵)">↻ Re-render <span style="opacity:0.6;">⌘↵</span></button>
            </div>
          </div>
          <textarea id="scene-display" spellcheck="false"
                    placeholder="(no 3D scene yet — Lift to 3D from a 2D code, or click a Demo Gallery card.)"></textarea>
        </div>
      </div>
    </div>

    <!-- Bottom status bar -->
    <div id="statusbar">
      <span class="fps" id="fps">FPS: --</span>
      <span class="scene-info" id="scene-info">No scene</span>
      <span id="status">ready</span>
      <span class="right" id="meta-info">SceneData v1 · Atlas Compositor v0 (M1)</span>
    </div>
  </div>

  <script type="module" src="./compositor.js"></script>
</body>
</html>
