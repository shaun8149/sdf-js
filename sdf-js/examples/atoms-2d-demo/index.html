<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Atlas 2D Atom Library Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 24px; font-family: 'Inter', system-ui; background: #fafafa; color: #1e1b1e; }
    h1 { margin: 0 0 4px; font-size: 22px; }
    h1 + p { margin: 0 0 24px; color: #666; font-size: 13px; }
    .palette-bar { margin: 8px 0 24px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 12px; }
    .palette-bar .label { color: #666; margin-right: 6px; }
    .palette-bar button { padding: 4px 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; font: inherit; border-radius: 3px; }
    .palette-bar button.active { background: #1e1b1e; color: #fff; border-color: #1e1b1e; }
    .palette-swatch { display: inline-flex; gap: 1px; margin-left: 4px; vertical-align: middle; }
    .palette-swatch span { width: 8px; height: 12px; display: inline-block; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .sample { background: var(--bg, #fff); padding: 0; border-radius: 6px; border: 1px solid #e5e5e5; overflow: hidden; }
    .sample h3 { margin: 0; padding: 10px 14px; font-size: 12px; font-weight: 600; background: #f5f5f5; border-bottom: 1px solid #e5e5e5; }
    .sample canvas { display: block; width: 100%; height: auto; }
    .meta { padding: 8px 14px; font-size: 11px; color: #666; border-top: 1px solid #e5e5e5; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>
  <h1>Atlas 2D Atom Library — Pseudo-3D Style Demo</h1>
  <p>Phase 0 hello-world: <code>kpi-card</code> atom rendered in main-page Canvas2D (not iframe). Switch palette to see how branding affects each atom.</p>
  <div id="palette-bar" class="palette-bar"></div>
  <div id="grid" class="grid"></div>

  <script type="module">
    import { renderSceneDataToCanvas } from '/src/present/atoms-2d/renderer.js';
    import { listAtomTypes } from '/src/present/atoms-2d/registry.js';
    import { BRANDING_PALETTES, getPalette } from '/src/present/branding-palettes.js';

    const FEATURED_PALETTES = [
      'mono-light',
      'chromotome:hilda01',
      'chromotome:jung_bird',
      'chromotome:kov_03',
      'chromotome:rag-mysore',
    ];

    let currentPaletteId = 'mono-light';

    // Demo cases — KPI card in different content shapes
    const SAMPLES = [
      { title: 'Hero Revenue + Trend Up',
        atom: { type: 'kpi-card', args: { value: '$3.4M', label: 'Q3 Revenue', sublabel: 'vs Q2 2024', trend: 'up', trendValue: '+127%', icon: 'chart-bar' } } },
      { title: 'User Growth',
        atom: { type: 'kpi-card', args: { value: '12,450', label: 'Monthly Active Users', sublabel: '+1.2k from last month', trend: 'up', trendValue: '+10.6%', icon: 'users' } } },
      { title: 'Churn Drop',
        atom: { type: 'kpi-card', args: { value: '2.1%', label: 'Monthly Churn', sublabel: 'down from 3.4%', trend: 'down', trendValue: '-1.3pt', icon: 'arrow-down' } } },
      { title: 'NPS Steady',
        atom: { type: 'kpi-card', args: { value: '68', label: 'NPS Score', sublabel: 'unchanged QoQ', trend: 'neutral', trendValue: '0', icon: 'star' } } },
      { title: 'Minimal (no trend, no icon)',
        atom: { type: 'kpi-card', args: { value: '$10M', label: 'Total ARR' } } },
      { title: 'Long Label',
        atom: { type: 'kpi-card', args: { value: '94%', label: 'Customer Satisfaction Score', sublabel: 'Based on Q3 NPS survey, n=1,250', trend: 'up', trendValue: '+3pt', icon: 'heart' } } },
      // ---- Bar chart samples (Phase 1a) ----
      { title: 'Bar — Quarterly Revenue',
        size: { w: 540, h: 280 },
        atom: { type: 'bar', args: { values: [1.2, 1.8, 2.4, 3.1], labels: ['Q1', 'Q2', 'Q3', 'Q4'], format: 'currency', title: 'Quarterly Revenue ($M)' } } },
      { title: 'Bar — Market Share',
        size: { w: 540, h: 280 },
        atom: { type: 'bar', args: { values: [32, 23, 11, 8, 26], labels: ['AWS', 'Azure', 'GCP', 'Alibaba', 'Others'], format: 'percent', title: 'Cloud Market Share' } } },
      { title: 'Bar — Survey Response',
        size: { w: 540, h: 280 },
        atom: { type: 'bar', args: { values: [62, 48, 35, 22, 18, 12], labels: ['Pricing', 'UX', 'Speed', 'Docs', 'Mobile', 'API'], format: 'number', title: 'Top Pain Points (% mentions)' } } },
      // ---- Line chart samples (Phase 1b) ----
      { title: 'Line — Revenue Trajectory',
        size: { w: 540, h: 300 },
        atom: { type: 'line', args: { values: [1.2, 1.8, 2.4, 3.1], labels: ['Q1', 'Q2', 'Q3', 'Q4'], format: 'currency', title: 'Quarterly Revenue ($M)', showValues: true } } },
      { title: 'Line — With Annotation',
        size: { w: 540, h: 300 },
        atom: { type: 'line', args: { values: [120, 142, 168, 240, 285, 310], labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], format: 'number', title: 'MAU (thousands)', annotations: [{ index: 3, text: '↑ feature launch' }] } } },
      { title: 'Line — Steady Growth',
        size: { w: 540, h: 280 },
        atom: { type: 'line', args: { values: [85, 88, 92, 94, 96, 95, 97], labels: ['W1', 'W2', 'W3', 'W4', 'W5', 'W6', 'W7'], format: 'percent', title: 'Weekly Retention' } } },
      // ---- Pie chart samples (Phase 1b) ----
      { title: 'Pie — Solid Cloud Share',
        size: { w: 480, h: 320 },
        atom: { type: 'pie', args: { values: [32, 23, 11, 8, 26], labels: ['AWS', 'Azure', 'GCP', 'Alibaba', 'Others'], format: 'percent', title: 'Cloud Market Share' } } },
      { title: 'Pie — Donut + Center Label',
        size: { w: 480, h: 320 },
        atom: { type: 'pie', args: { values: [45, 25, 15, 10, 5], labels: ['Eng', 'Sales', 'Marketing', 'Support', 'Other'], format: 'percent', title: 'Headcount Split', donutRatio: 0.55, centerLabel: '120' } } },
      { title: 'Pie — Revenue by Segment',
        size: { w: 480, h: 320 },
        atom: { type: 'pie', args: { values: [4.2, 2.1, 1.5, 0.8], labels: ['Enterprise', 'Mid-market', 'SMB', 'Indie'], format: 'currency', title: 'Revenue $M by Segment', donutRatio: 0.4 } } },
      // ---- Column chart samples (Phase 1c) ----
      { title: 'Column — Quarterly Revenue',
        size: { w: 540, h: 320 },
        atom: { type: 'column', args: { values: [1.2, 1.8, 2.4, 3.1], labels: ['Q1', 'Q2', 'Q3', 'Q4'], format: 'currency', title: 'Quarterly Revenue ($M)' } } },
      { title: 'Column — Monthly Signups',
        size: { w: 540, h: 320 },
        atom: { type: 'column', args: { values: [340, 420, 510, 580, 670, 820], labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], format: 'number', title: 'Monthly Signups' } } },
      { title: 'Column — Conversion by Channel',
        size: { w: 540, h: 320 },
        atom: { type: 'column', args: { values: [4.2, 8.7, 3.1, 12.5, 6.3], labels: ['Organic', 'Paid', 'Email', 'Referral', 'Social'], format: 'percent', title: 'Conversion Rate by Channel' } } },
      // ---- Flow chart samples (Phase 2a) ----
      { title: 'Flow — User Journey',
        size: { w: 720, h: 220 },
        atom: { type: 'flow-chart', args: { steps: ['Sign up', 'Verify', 'Onboard', 'Purchase', 'Retain'], sublabels: ['Day 0', 'Day 0', 'Day 1', 'Day 3', 'Day 30'], highlight: 3, title: 'User Activation Funnel' } } },
      { title: 'Flow — Build Pipeline',
        size: { w: 720, h: 200 },
        atom: { type: 'flow-chart', args: { steps: ['Commit', 'Test', 'Build', 'Deploy'], title: 'CI/CD Pipeline' } } },
      { title: 'Flow — Vertical Decision',
        size: { w: 320, h: 540 },
        atom: { type: 'flow-chart', args: { steps: ['Request', 'Auth check', 'Rate limit', 'Process', 'Response'], orientation: 'vertical', title: 'Request Pipeline' } } },
      // ---- Tree diagram (Phase 2b) ----
      { title: 'Tree — Product Categories',
        size: { w: 720, h: 360 },
        atom: { type: 'tree-diagram', args: { title: 'Product Categories', root: { label: 'Software', children: [{ label: 'Enterprise', children: [{ label: 'CRM' }, { label: 'ERP' }] }, { label: 'Consumer', children: [{ label: 'Mobile' }, { label: 'Web' }, { label: 'Desktop' }] }, { label: 'Developer' }] } } } },
      // ---- Org chart (Phase 2b) ----
      { title: 'Org — Executive Team',
        size: { w: 720, h: 380 },
        atom: { type: 'org-chart', args: { title: 'Executive Team', root: { name: 'Sarah Chen', title: 'CEO', children: [{ name: 'Mike Park', title: 'CTO', children: [{ name: 'Alex Wu', title: 'Eng Manager' }, { name: 'Jamie Lee', title: 'Sr Engineer' }] }, { name: 'Lisa Wang', title: 'CMO', children: [{ name: 'Tom Chen', title: 'Brand Lead' }] }, { name: 'David Liu', title: 'CFO' }] } } } },
      // ---- Mindmap (Phase 2c) ----
      { title: 'Mindmap — Atlas Architecture',
        size: { w: 720, h: 480 },
        atom: { type: 'mindmap', args: { title: 'Atlas Architecture', root: { label: 'Atlas', children: [{ label: 'Engine', children: [{ label: 'SDF' }, { label: 'Renderer' }, { label: 'Compiler' }] }, { label: 'Present', children: [{ label: 'Atoms' }, { label: 'Pipeline' }] }, { label: 'Compositor', children: [{ label: 'Lift' }] }, { label: 'Studio' }] } } } },
      // ---- Relationship graph (Phase 2c) ----
      { title: 'Relationship — Team Dependencies',
        size: { w: 720, h: 460 },
        atom: { type: 'relationship-graph', args: { title: 'Team Dependencies', nodes: [{ id: 'eng', label: 'Engineering', group: 0 }, { id: 'design', label: 'Design', group: 0 }, { id: 'pm', label: 'Product Mgmt', group: 0 }, { id: 'figma', label: 'Figma', group: 1 }, { id: 'github', label: 'GitHub', group: 1 }, { id: 'jira', label: 'Jira', group: 1 }], edges: [{ from: 'eng', to: 'github', label: 'uses' }, { from: 'eng', to: 'jira', label: 'uses' }, { from: 'design', to: 'figma', label: 'uses' }, { from: 'design', to: 'jira', label: 'uses' }, { from: 'pm', to: 'jira', label: 'owns' }, { from: 'pm', to: 'figma', label: 'reviews' }] } } },
      // ---- Timeline (Phase 2c part 2) ----
      { title: 'Timeline — Company Milestones',
        size: { w: 800, h: 280 },
        atom: { type: 'timeline', args: { title: 'Company Milestones', axisLabel: '2024-2026', events: [{ date: '2024 Q1', label: 'Seed Round', sublabel: '$2M' }, { date: '2024 Q4', label: 'Product Launch', sublabel: 'Public beta' }, { date: '2025 Q3', label: 'Series A', sublabel: '$15M' }, { date: '2026 Q2', label: 'Profitable', sublabel: '$10M ARR' }] } } },
      // ---- Pyramid (closes Phase 2) ----
      { title: 'Pyramid — Maslow Hierarchy',
        size: { w: 480, h: 480 },
        atom: { type: 'pyramid', args: { title: "Maslow's Hierarchy", layers: [{ label: 'Physiological', sublabel: 'food, water, sleep' }, { label: 'Safety', sublabel: 'security, employment' }, { label: 'Belonging', sublabel: 'friends, family' }, { label: 'Esteem', sublabel: 'confidence, status' }, { label: 'Self-Actualization', sublabel: 'fulfillment' }] } } },
      { title: 'Pyramid — Inverted Funnel',
        size: { w: 480, h: 480 },
        atom: { type: 'pyramid', args: { title: 'Sales Funnel', inverted: true, layers: [{ label: 'Visitors', value: '10K' }, { label: 'Trial', value: '1.2K' }, { label: 'Active', value: '400' }, { label: 'Paying', value: '120' }, { label: 'Champions', value: '24' }] } } },
    ];

    function rgbCss(rgb) { return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`; }

    function renderPaletteBar() {
      const bar = document.getElementById('palette-bar');
      bar.innerHTML = '<span class="label">Palette:</span>';
      for (const id of FEATURED_PALETTES) {
        const p = getPalette(id);
        if (!p) continue;
        const btn = document.createElement('button');
        btn.textContent = p.label || id;
        if (id === currentPaletteId) btn.classList.add('active');
        const sw = document.createElement('span');
        sw.className = 'palette-swatch';
        sw.innerHTML += `<span style="background:${rgbCss(p.bg)}"></span>`;
        for (const c of (p.colors || [p.silhouetteColor]).slice(0, 4)) {
          sw.innerHTML += `<span style="background:${rgbCss(c)}"></span>`;
        }
        btn.appendChild(sw);
        btn.addEventListener('click', () => { currentPaletteId = id; renderAll(); });
        bar.appendChild(btn);
      }
    }

    async function renderAll() {
      renderPaletteBar();
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const palette = getPalette(currentPaletteId);
      const sceneDataBg = rgbCss(palette.bg);

      for (const sample of SAMPLES) {
        const card = document.createElement('div');
        card.className = 'sample';
        card.style.setProperty('--bg', sceneDataBg);
        card.innerHTML = `<h3>${sample.title}</h3>`;

        const canvas = document.createElement('canvas');
        const sz = sample.size || { w: 320, h: 180 };
        canvas.width = sz.w;
        canvas.height = sz.h;
        card.appendChild(canvas);

        const sceneData = {
          subjects: [
            { ...sample.atom, x: 20, y: 20, w: sz.w - 40, h: sz.h - 40, style: 'pseudo3d' },
          ],
        };
        const result = await renderSceneDataToCanvas(canvas, sceneData, { palette });

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `rendered: ${result.rendered} / skipped: ${result.skipped} / errors: ${result.errors.length}`;
        if (result.errors.length) meta.textContent += ' — ' + result.errors[0].error;
        card.appendChild(meta);

        grid.appendChild(card);
      }
    }

    console.log('Loaded atoms:', listAtomTypes());
    renderAll();
  </script>
</body>
</html>
